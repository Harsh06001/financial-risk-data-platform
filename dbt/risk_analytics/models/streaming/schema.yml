version: 2

models:
  - name: stg_streaming_transaction_events
    description: Clean, opt-in view over controlled streaming transaction events.
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: event_date
        tests:
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ['authorization', 'purchase', 'refund']
      - name: amount
        tests:
          - not_null

  - name: mart_streaming_risk_summary
    description: Daily summary for the opt-in streaming simulation layer.
    columns:
      - name: event_date
        tests:
          - not_null
          - unique

  - name: mart_streaming_event_quality
    description: Daily quality and processing-health summary for valid streaming events.
    columns:
      - name: event_date
        tests:
          - not_null
          - unique
      - name: event_count
        tests:
          - not_null

  - name: mart_realtime_risk_trends
    description: Hourly opt-in trend mart for the local or GCP streaming source.
    columns:
      - name: event_date
        tests:
          - not_null
      - name: event_hour
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['authorization', 'purchase', 'refund']
      - name: event_count
        tests:
          - not_null
