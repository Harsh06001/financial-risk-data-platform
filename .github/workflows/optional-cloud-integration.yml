name: Optional GCP Integration

on:
  workflow_dispatch:
    inputs:
      run_dbt_build:
        description: Run dbt models and tests against the configured dataset
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-live-warehouse:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      DBT_DATASET: ${{ secrets.BIGQUERY_DATASET }}
      GCP_LOCATION: ${{ vars.GCP_LOCATION || 'us-central1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt
        if: inputs.run_dbt_build
        run: python -m pip install -r requirements-dbt.txt
      - name: Validate BigQuery contracts
        run: python warehouse/validate_bigquery_tables.py
      - name: Collect live warehouse observations
        run: python observability/collect_metrics.py --component bigquery
      - name: Run dbt
        if: inputs.run_dbt_build
        run: dbt run --project-dir dbt/risk_analytics --profiles-dir dbt/risk_analytics
      - name: Test dbt
        if: inputs.run_dbt_build
        run: dbt test --project-dir dbt/risk_analytics --profiles-dir dbt/risk_analytics
